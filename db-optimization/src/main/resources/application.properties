spring.application.name=db-optimization

spring.datasource.url=jdbc:mysql://localhost:3306/db_optimization_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=springuser
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Batch insert tuning for the data seeder
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.datasource.hikari.maximum-pool-size=50

# Tomcat connector tuning for load testing (defaults: 200 threads, 100 accept-count)
server.tomcat.threads.max=400
server.tomcat.accept-count=200
server.tomcat.max-connections=2000

logging.level.com.dbopt.app=INFO
