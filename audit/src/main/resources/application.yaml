# Database Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/audit_db
    username: springuser
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Application Configuration
  application:
    name: audit-system

# Server Configuration
server:
  port: 8080