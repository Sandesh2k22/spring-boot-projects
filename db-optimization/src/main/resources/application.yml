spring:
  application:
    name: db-optimization
  datasource:
    url: jdbc:mysql://localhost:3306/db_optimization_db
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: springuser
    password: 123
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        # Batch insert tuning for the data seeder
        jdbc:
          batch_size: 500
        order_inserts: true

logging:
  level:
    com.dbopt.app: DEBUG
